services:
  backend:
    build:
      context: .
      dockerfile: Dockerfile
    ports:
      - "12400:12400"
    volumes:
      - ./data:/app/data
      - ./prompts:/app/prompts
      - type: bind
        source: ./conf.yaml
        target: /app/conf.yaml
        read_only: true
        bind:
          # Fail clearly instead of creating a conf.yaml directory by accident.
          create_host_path: false
    environment:
      PYTHONPATH: src
      PYTHONUNBUFFERED: "1"
      # Required when opening the settings/API from another machine.
      # Put WHITE_SALARY_MANAGEMENT_TOKEN in a local .env file.
      WHITE_SALARY_MANAGEMENT_TOKEN: ${WHITE_SALARY_MANAGEMENT_TOKEN:-}
    restart: unless-stopped
